  - name: main_search_strategy
    kind: config
    description: "Problem-owned whole-algorithm CVRP main-search strategy."
    algorithm:
      role: whole_algorithm_main_search_strategy
      invocation_point: construction_baseline_internal_main_loop_before_optional_registry_operators
      description: >-
        Takes over the CVRP package's main algorithm lifecycle when enabled:
        bounded construction ensemble, repo-local baseline time budget and
        sanitized baseline params, package-owned improvement loop components
        including route-pair swap and bounded destroy/repair, bounded
        acceptance/restart/perturbation knobs, and optional post-baseline
        registry-operator scheduling. The solver audits component coverage with
        selected, attempted, accepted, skipped/skip-reason, objective-delta, and
        destroy/repair count telemetry, and records conservative baseline-param
        clamp telemetry as a non-empty JSON-safe evidence object even when no
        clamp is applied. Defaults are inactive and disable
        post-baseline registry operators for this surface unless explicitly
        requested.
    targets:
      files:
        - "policies/main_search_strategy.py"
      create_new_allowed: false
      modify_allowed: true
      remove_allowed: false
      singleton: true
    interface:
      required_functions:
        - "main_search_plan"
      function_signatures:
        main_search_plan:
          - instance
          - time_limit_sec
      return_contract: >-
        main_search_plan returns a bounded dict with enabled bool,
        construction dict, baseline dict, improvement dict, acceptance dict,
        restart dict, perturbation dict, post_baseline_operators_enabled bool,
        and operator_round_limit int. The perturbation dict may include
        schedule set to after_no_improvement, before_first_round, or
        before_each_round. When enabled is true, all required keys must be
        present and valid or the solver records
        main_search_strategy_errors and refuses main-search takeover.
      return_values:
        main_search_plan:
          value_type: mapping
          allowed_keys:
            - enabled
            - construction
            - baseline
            - improvement
            - acceptance
            - restart
            - perturbation
            - post_baseline_operators_enabled
            - operator_round_limit
          required_keys:
            - enabled
            - construction
            - baseline
            - improvement
            - acceptance
            - restart
            - perturbation
            - post_baseline_operators_enabled
            - operator_round_limit
    bounds:
      allowed_components:
        - nearest_neighbor
        - nearest_neighbor_demand_bias
        - demand_descending
        - sequential
        - intra_route_2opt
        - inter_route_relocate
        - route_pair_swap
        - bounded_destroy_repair
        - repo_local_baseline_params
        - strict_improvement_acceptance
        - restart_stagnation
        - bounded_perturbation
        - pre_improvement_perturbation
        - post_baseline_operator_toggle
      numeric_ranges:
        construction_keep_top_k: [1, 4]
        construction_bias: [0.0, 1.0]
        baseline_time_fraction: [0.2, 0.95]
        destroy_ratio: [0.01, 0.80]
        segment_length: [1, 1000]
        reaction_factor: [0.01, 1.0]
        vns_max_no_improve: [0, 20000]
        max_destroy_customers: [1, 500]
        improvement_rounds: [1, 8]
        improvement_top_k: [1, 128]
        min_distance_improvement: [0.0, 10.0]
        restart_stagnation_rounds: [0, 25]
        max_restarts: [0, 3]
        perturbation_strength: [1, 8]
        max_perturbations: [0, 4]
        operator_round_limit: [0, 20]
      complexity_scale_terms:
        - time_limit_sec
        - route_count
        - customer_count
        - improvement_top_k
        - max_destroy_customers
    evidence:
      required_runtime_fields:
        - main_search_strategy_loaded
        - main_search_strategy_active
        - main_search_strategy_errors
        - main_search_plan
        - main_search_phases
        - main_search_construction_methods
        - main_search_baseline_time_fraction
        - main_search_baseline_time_fraction_effective
        - main_search_baseline_quality_guard_applied
        - main_search_baseline_params
        - main_search_baseline_params_clamped
        - main_search_baseline_param_clamps
        - main_search_post_baseline_operators_enabled
        - main_search_operator_round_limit
        - main_search_components
        - main_search_component_coverage_status
        - main_search_deep_components_selected
