        - deep_components_selected
        - budget_pattern
        - destroy_repair_pattern
        - baseline_fraction_pattern
        - acceptance_restart_pattern
        - perturbation_pattern
    prompt:
      hypothesis_guidance: >-
        State how the whole main-search strategy should improve CVRP evidence:
        which construction ensemble, repo-local baseline params/budget,
        package-owned improvement components, acceptance threshold, restart or
        perturbation knobs, and optional registry-operator setting should work
        together. Prefer this surface for forced diagnostics after
        post-baseline operator work has shown low accepted-move value. In
        forced diagnostic runs, prefer the R1-like safe schedule: baseline
        time_fraction around 0.75, conservative baseline params, route_pair_swap
        before bounded_destroy_repair, 5 improvement rounds, top_k 64, and
        perturbation strength 2-3 with max_perturbations 2. If runtime
        feedback shows recovery-only moves, explicitly choose perturbation
        schedule after_no_improvement, before_first_round, or
        before_each_round and explain why the selected timing can turn recovery
        into phase-best gain. The solver gates bounded_destroy_repair after
        same-round route-pair phase-best improvements and separately audits
        recovery moves that only improve a perturbed/current solution, so
        runtime evidence distinguishes recovery-only accepted deltas from
        phase-best objective gain.
      implementation_guidance: >-
        Keep main_search_plan deterministic, side-effect free, and return only
        the declared bounded plan dict. The solver owns construction,
        repo-local baseline invocation, route edits, feasibility checks,
        strict-improvement acceptance, a formal-run baseline quality guard,
        component-coverage telemetry, restarts, perturbations, and optional
        registry operators. The perturbation schedule only changes when
        perturbation is applied; after_no_improvement is the legacy default,
        before_first_round perturbs once before the first improvement round,
        and before_each_round perturbs before each round while perturbation
        budget remains. For instance features,
        use instance.customer_ids,
        instance.customer_count, instance.demands[customer_id],
        instance.capacity, and instance.distance(i, j). Leave
        post_baseline_operators_enabled false unless the hypothesis explicitly
        needs generated registry operators after the owned main loop. For
        forced diagnostics, include novelty_signature fields that distinguish
        selected_components, deep_components_selected, budget_pattern, and
        destroy_repair_pattern from prior whole-algorithm strategies. Avoid
        aggressive baseline params such as global max_destroy_customers=200 on
        smaller formal cases; active main-search params are conservatively
        clamped and audited by the solver.
      anti_patterns: >-
        Do not import solver internals, read benchmark files, create or mutate
        routes directly, use instance.customers or other undeclared instance
        aliases, invent improvement components, return unknown keys, widen
        numeric bounds, bypass baseline param sanitization, enable registry
        operators by habit, or encode case-name-specific behavior. Never use
        instance.customers; it is not part of the CVRP instance API.
    target_files:
      - "policies/main_search_strategy.py"
    prompt_hint: >-
      Govern the whole CVRP main-search lifecycle through a bounded plan;
      registry post-baseline operators are off by default. Forced diagnostic
      candidates should select route_pair_swap and bounded_destroy_repair for
      5 improvement rounds, use top_k 64 or 128 for destroy/repair budget, and
      expose that choice in the novelty signature; prefer baseline.time_fraction
      around 0.75 with conservative ALNS/VNS params, route_pair_swap before
      bounded_destroy_repair, and perturbation strength 2-3/max 2. When using
      a perturbation-first idea, implement it through perturbation.schedule
      rather than only describing it in prose.
    required_functions:
      - "main_search_plan"
    create_new_allowed: false
    modify_allowed: true
    remove_allowed: false
