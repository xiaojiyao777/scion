spec_version: "problem-v1"

id: cvrp
display_name: "Capacitated Vehicle Routing Problem"
root_dir: PLACEHOLDER
description: >-
  CVRP adapter skeleton for v0.4 route-native verification and runtime
  evidence hardening.

search_space:
  editable:
    - "operators/*.py"
    - "policies/*.py"
  frozen:
    - "adapter.py"
    - "cvrplib.py"
    - "models.py"
    - "solver.py"
    - "operators/base.py"
    - "operators/__init__.py"
    - "policies/__init__.py"
  import_whitelist:
    - __future__
    - copy
    - dataclasses
    - itertools
    - math
    - models
    - random
    - typing

solver:
  time_limit_sec: 30
  max_iter: 1000

parameter_search:
  enabled: false

canary_case_path: "data/tiny_canary.json"

operator_interface:
  base_class_import: "scion.problems.cvrp.operators.base:CvrpOperator"
  execute_signature: "execute(self, solution, instance, rng) -> CvrpSolution"
  categories:
    - name: route_local
      description: "Intra-route bounded operators such as 2-opt and Or-opt."
    - name: route_pair
      description: "Inter-route bounded relocate, swap, 2-opt*, and exchange operators."
    - name: ruin_recreate
      description: "Bounded destroy/repair operators with explicit customer and route caps."

research_surfaces:
  - name: route_local
    kind: operator
    description: "Intra-route bounded improvement operators."
    target_files:
      - "operators/*.py"
    prompt_hint: "Use only bounded same-route neighborhoods."
    create_new_allowed: true
    modify_allowed: true
    remove_allowed: true
  - name: route_pair
    kind: operator
    description: "Inter-route bounded relocate, swap, 2-opt*, and exchange operators."
    target_files:
      - "operators/*.py"
    prompt_hint: "Use bounded two-route neighborhoods with explicit candidate caps."
    create_new_allowed: true
    modify_allowed: true
    remove_allowed: true
  - name: ruin_recreate
    kind: operator
    description: "Bounded destroy/repair operators with explicit customer and route caps."
    target_files:
      - "operators/*.py"
    prompt_hint: "Keep destroy size, repair candidates, and route scans explicitly bounded."
    create_new_allowed: true
    modify_allowed: true
    remove_allowed: true
  - name: search_policy
    kind: policy
    description: "Baseline/operator budget and scheduling policy."
    target_files:
      - "policies/search_policy.py"
    prompt_hint: "Tune baseline time fraction and post-baseline operator budget."
    required_functions:
      - "baseline_time_fraction"
      - "max_operator_rounds"
      - "enable_post_baseline_operators"
    create_new_allowed: false
    modify_allowed: true
    remove_allowed: false

objective_policy:
  mode: lexicographic
  expose_weights_to_llm: false

objectives:
  - name: fleet_violation
    direction: minimize
    priority: 1
    tie_tolerance: 0.0
  - name: total_distance
    direction: minimize
    priority: 2
    tie_tolerance: 0.001

llm_hints:
  problem_summary: >-
    Build ordered capacity-feasible routes from the depot. Every customer must
    appear exactly once. The first objective is fleet_violation; total distance
    matters only after route-count comparability is protected.
  operator_interface: >-
    Operators receive CvrpSolution and CvrpInstance and must return a feasible
    CvrpSolution. They must use bounded route-local or route-pair neighborhoods,
    top-k filters, sampling, or early no-op exits. CvrpSolution.routes is a
    tuple of implicit-depot customer routes. CvrpInstance exposes capacity,
    depot, customer_ids, node_ids, demand(customer_id), distance(i, j),
    route_load(route), and route_distance(route). Do not use nonexistent
    attributes such as vehicle_capacity, demands, distance_matrix, customers,
    or num_customers.

family_taxonomy:
  version: "cvrp-route-v1"
  families:
    - route_local
    - route_pair
    - ruin_recreate
    - search_policy
  aliases:
    route_local:
      - route local
      - intra route
      - intra-route
      - within route
      - same route
      - 2 opt
      - 2-opt
    route_pair:
      - route pair
      - route-pair
      - inter route
      - inter-route
      - cross route
      - cross-route
      - other route
      - different route
      - one route to another
      - from one route to another
      - between routes
      - between route
      - two route
      - 2 opt exchange
      - 2-opt exchange
      - 2 opt star
      - 2 opt*
      - 2-opt*
      - exchange
      - relocate
      - relocation
      - relocating
      - relocates
      - swap
      - merge routes
      - merge route
      - combine routes
      - combine route
    ruin_recreate:
      - ruin
      - recreate
      - destroy
      - rebuild
      - repair
      - remove and insert
    search_policy:
      - search policy
      - baseline budget
      - operator budget
      - post baseline
      - scheduling policy

adapter:
  import_path: "scion.problems.cvrp.adapter:CvrpAdapter"
  api_version: "v1"
