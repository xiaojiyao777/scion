objective_policy:
  mode: lexicographic
  expose_weights_to_llm: false

objectives:
  - name: fleet_violation
    direction: minimize
    priority: 1
    tie_tolerance: 0.0
  - name: total_distance
    direction: minimize
    priority: 2
    tie_tolerance: 0.001

llm_hints:
  problem_summary: >-
    Build ordered capacity-feasible routes from the depot. Every customer must
    appear exactly once. The first objective is fleet_violation; total distance
    matters only after route-count comparability is protected.
  operator_interface: >-
    Operators receive CvrpSolution and CvrpInstance and must return a feasible
    CvrpSolution. They must use bounded route-local or route-pair neighborhoods,
    top-k filters, sampling, or early no-op exits. CvrpSolution.routes is a
    tuple of implicit-depot customer routes. CvrpInstance exposes capacity,
    depot, customer_ids, customer_count, node_ids, demands,
    demand(customer_id), distance(i, j), route_load(route), and
    route_distance(route). Use demands[customer_id] for direct demand lookup.
    Do not use nonexistent attributes such as vehicle_capacity,
    distance_matrix, customers, or num_customers. Never use instance.customers.
    The preferred whole-algorithm research surface is main_search_strategy:
    change only policies/main_search_strategy.py and return a bounded
    main_search_plan; do not edit solver.py.

