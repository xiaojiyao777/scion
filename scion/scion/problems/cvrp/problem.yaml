name: cvrp
description: >-
  Capacitated Vehicle Routing Problem runtime for Scion v0.4 formal campaign
  readiness. ProblemSpecV1 remains the authoritative adapter/objective schema;
  this legacy file exists for the current CLI entrypoint.

operators_dir: ""
data_dir: data
oracle_path: ""
solver_path: solver.py
canary_case_path: controlled/data/synthetic_controlled_canary_5.vrp
unit_test_path: ""
regression_test_path: ""

operator_categories:
  - solver_design

search_space:
  editable:
    - "policies/baseline_algorithm.py"
    - "policies/baseline_modules/*.py"
  frozen:
    - "adapter.py"
    - "models.py"
    - "solver.py"
    - "solver_runtime/*.py"
    - "policies/__init__.py"
    - "policies/baseline_modules/__init__.py"
  import_whitelist:
    - __future__
    - copy
    - dataclasses
    - itertools
    - math
    - models
    - random
    - time
    - typing

solver:
  time_limit_sec: 30
  max_iter: 1000

parameter_search:
  enabled: false
