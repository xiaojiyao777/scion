# problem.yaml — Warehouse Delivery (surrogate solver integration)
name: warehouse_delivery
description: >-
  Warehouse Delivery Assignment: assign B2B orders to a fleet of vehicle slots
  for last-mile logistics. Each order has SPU-determined pallet counts, a
  pickup region (east/west/east-south), a subcategory, and a hazmat flag. Each
  vehicle slot chooses one of 5 vehicle types (HQ40_DG/HQ40/T10/T5/T3) with
  different capacities and costs. Constraints: capacity, region consolidation,
  subcategory single-assignment, hazmat isolation (HQ40_DG), pickup-point
  limits. Objective (lexicographic): minimise subcategory splits first, then
  total vehicle cost, then solve time. Operators modify the assignment (move,
  swap, merge, split, destroy-rebuild) to improve the objective.
  NOTE: This is NOT a routing problem. There is no path, no distance matrix,
  no TSP subproblem. Classical VRP heuristics (2-opt, Or-opt, savings, etc.)
  do not apply. The problem is a multi-attribute generalised assignment /
  bin-packing problem.
root_dir: /home/clawd/research/or-autoresearch-agent/surrogate
operators_dir: operators
data_dir: data
oracle_path: oracle.py
solver_path: solver.py
operator_categories:
  - order_level
  - vehicle_level
search_space:
  # LLM may edit any .py file in operators/ except base.py and __init__.py
  editable:
    - "operators/*.py"
  # Frozen files — never patched
  frozen:
    - "solver.py"
    - "vns.py"
    - "pool.py"
    - "models.py"
    - "config.py"
    - "oracle.py"
    - "greedy_init.py"
    - "operators/base.py"
    - "operators/__init__.py"
  import_whitelist:
    - __future__
    - math
    - random
    - copy
    - typing
    - dataclasses
    - operators
    - itertools
    - functools
    - collections
    - enum
    - abc
    - models
solver:
  time_limit_sec: 300
  max_iter: 200
canary_case_path: /home/clawd/research/or-autoresearch-agent/surrogate/data/instance_small_1.json
unit_test_path: tests/test_operators.py
regression_test_path: tests/test_solver.py
