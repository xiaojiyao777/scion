# problem.yaml — Warehouse Delivery (surrogate solver integration)
name: warehouse_delivery
description: >-
  Warehouse Delivery VRP: optimise vehicle routing for last-mile B2B logistics
  from a warehouse to customer delivery points. Orders carry SPU (packing unit)
  loads that determine pallet counts. A feasible solution assigns each order to
  exactly one vehicle; vehicles must not exceed capacity. The objective is
  lexicographic: minimise subcategory splits first, then total vehicle cost,
  then solve time. Operators modify the solution (move, swap, merge, split,
  destroy-rebuild) to improve the objective. Hazardous-goods orders require a
  dedicated HQ40_DG vehicle type.
root_dir: /home/clawd/research/or-autoresearch-agent/surrogate
operators_dir: operators
data_dir: data
oracle_path: oracle.py
solver_path: solver.py
operator_categories:
  - order_level
  - vehicle_level
search_space:
  # LLM may edit any .py file in operators/ except base.py and __init__.py
  editable:
    - "operators/*.py"
  # Frozen files — never patched
  frozen:
    - "solver.py"
    - "vns.py"
    - "pool.py"
    - "models.py"
    - "config.py"
    - "oracle.py"
    - "greedy_init.py"
    - "operators/base.py"
    - "operators/__init__.py"
  import_whitelist:
    - __future__
    - math
    - random
    - copy
    - typing
    - dataclasses
    - operators
    - itertools
    - functools
    - collections
    - enum
    - abc
    - uuid
    - models
solver:
  time_limit_sec: 300
  max_iter: 200
canary_case_path: /home/clawd/research/or-autoresearch-agent/surrogate/data/instance_small_1.json
