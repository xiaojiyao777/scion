# split_manifest.yaml — Warehouse Delivery case splits
# 更新于：2026-04-08 添加 medium_2, medium_3 提升区分度
#
# 共 9 个有区分度的 instances (各集合互不相交，frozen/canary 与其余完全不重叠):
#   screening (4):  small_4, small_5, medium_1, medium_2
#   validation (4): small_1, small_3, medium_3, medium_4
#   frozen (1):     xlarge_1
#   canary (1):     small_6
#
# medium_2 (30 orders, 8 subcategories): 高子类别多样性，greedy 产生更多小类分裂
# medium_3 (35 orders, ~40% locked vehicles): 高锁车比例，VNS 改善空间大，seed 敏感
version: "1.1"
screening:
  - data/instance_small_4.json
  - data/instance_small_5.json
  - data/instance_medium_1.json
  - data/instance_medium_2.json
validation:
  - data/instance_small_1.json
  - data/instance_small_3.json
  - data/instance_medium_3.json
  - data/instance_medium_4.json
frozen:
  - data/instance_xlarge_1.json
canary:
  - data/instance_small_6.json
