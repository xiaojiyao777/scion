# split_manifest.yaml — Warehouse Delivery case splits
# 更新于：2026-04-08 添加 4 个新有区分度的 instances (small_4-6, medium_4)
#
# 共 7 个有区分度的 instances (各集合互不相交，frozen/canary 与其余完全不重叠):
#   screening (3):  small_4, small_5, medium_1
#   validation (3): small_1, small_3, medium_4
#   frozen (1):     xlarge_1
#   canary (1):     small_6
#
# 设计原则：每个 subcat 内使用 3 个 Dongguan 仓库，迫使 greedy 产生分车小类分裂；
# VNS 在不同 seed 下得到不同结果，赋予统计分辨力。
version: "1.0"
screening:
  - data/instance_small_4.json
  - data/instance_small_5.json
  - data/instance_medium_1.json
validation:
  - data/instance_small_1.json
  - data/instance_small_3.json
  - data/instance_medium_4.json
frozen:
  - data/instance_xlarge_1.json
canary:
  - data/instance_small_6.json
