# split_manifest.yaml — Warehouse Delivery case splits
# 更新于：2026-04 以支持更大规模 benchmark 实例
#
# screening:   small_1 + medium_1 + large_1  (3 instances × 2 seeds = 6 pairs)
#              — 覆盖小/中/大三个规模，提高算子区分度
# validation:  screening 基础上加 large_2 + xlarge_1 (5 instances)
#              — 更全面的泛化性测试
# frozen:      xlarge_1 作为 holdout，防止过拟合
version: "1.0"
screening:
  - data/instance_small_1.json
  - data/instance_medium_1.json
  - data/instance_large_1.json
validation:
  - data/instance_large_2.json
  - data/instance_large_3.json
frozen:
  - data/instance_xlarge_1.json
canary: []
