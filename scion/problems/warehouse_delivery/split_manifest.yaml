# split_manifest.yaml — Warehouse Delivery case splits (v2)
# Updated: 2026-04-08 — v2 instances with proven discriminative power
#
# All instances validated: ≥2/3 seeds produce distinct VNS results.
# Naming: scr=screening, val=validation, fro=frozen, can=canary
# Sizes: s=small(15-25), m=medium(30-60), l=large(80-150), x=xlarge(200-500)
