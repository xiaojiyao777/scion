# protocol.yaml — Warehouse Delivery v3 experiment protocol
# Updated: 2026-04-12 — G2 case-level stats, canary split, expand-cases rules
#
# Statistical unit: case (not (case, seed) pair)
# screening: modify/remove: 6 cases × 2 seeds; create: 10 cases × 2 seeds
# validation: 6 cases × 3 seeds = 18 evaluations per case
# frozen: 4 cases × 3 seeds = 12 evaluations
version: "3.0"

screening:
  n_cases_modify: 6
  n_cases_create: 10
  n_seeds: 2
  expand_to_modify: 10
  expand_to_create: 16

validation:
  n_cases: 6
  n_seeds: 3
  expand_to: 10

frozen:
  n_cases: 4
  n_seeds: 3
  max_uses_per_campaign: 3

canary:
  cases: []
  seeds: []

gates:
  screening:
    win_rate_min: 0.60
    median_delta_min: "practical_delta_screen"
  validation:
    win_rate_min: 0.66
    median_delta_min: "practical_delta_validate"
    bootstrap_ci_low_min: 0.0
    bootstrap_n: 10000
  frozen:
    bootstrap_ci_low_min: 0.0
    canary_required: true
